<!-- Notes/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MimiTracker - Notes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body data-theme="light">

    <header>
        <div class="header-left">
            <a href="../index.html" class="back-btn">🌸 Back Home</a>
        </div>
        <div class="logo">📝 Notes</div>
        <div class="header-right">
            <div id="partner-status" class="partner-status" style="display: none;"></div>
        </div>
    </header>

    <main class="container">

        <!-- Note Creator -->
        <div class="card form-card" id="note-creator-card">
            <h3>Create New Note ✨</h3>

            <div class="visibility-toggle">
                <label class="radio-label">
                    <input type="radio" name="note-visibility" value="private" checked>
                    <span class="radio-btn">🔒 Only Me</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="note-visibility" value="shared">
                    <span class="radio-btn">💖 Shared</span>
                </label>
            </div>

            <div class="input-group">
                <textarea id="note-content" placeholder="Write something sweet..." oninput="autoResize(this)"></textarea>
            </div>

            <!-- IMAGE UPLOAD RESTORED -->
            <div class="media-upload-row">
                <label class="custom-file-upload">
                    <input type="file" id="note-image" accept="image/*">
                    📸 Add Image
                </label>
                <span id="file-name-preview">No image selected</span>
            </div>

            <div class="creator-footer">
                <div class="color-picker">
                    <button class="color-dot active" style="background: #FFF0F2;" data-color="#FFF0F2"></button>
                    <button class="color-dot" style="background: #FFF9E6;" data-color="#FFF9E6"></button>
                    <button class="color-dot" style="background: #EAF9EE;" data-color="#EAF9EE"></button>
                    <button class="color-dot" style="background: #EBF7FF;" data-color="#EBF7FF"></button>
                    <button class="color-dot" style="background: #F4E6F9;" data-color="#F4E6F9"></button>
                </div>

                <button id="save-note-btn" onclick="saveNote()">Pin Note ✨</button>
            </div>
        </div>

        <!-- Notes Grid -->
        <div class="notes-grid" id="notes-grid"></div>

    </main>

    <script src="script.js"></script>
</body>
</html>
